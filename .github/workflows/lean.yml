name: Lean CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          build: true
          use-github-cache: false
